<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет — TETIM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container" style="padding: 40px 0;">
    <div class="section-title-row">
      <div>
        <h1>Личный кабинет</h1>
        <p>Профиль покупателя и история заказов</p>
      </div>
      <button id="logout-btn" class="btn btn-light">Выйти</button>
    </div>

    <div class="cart-layout">
      <div class="card-lite">
        <h3>Профиль</h3>
        <div id="profile-block"></div>
      </div>

      <div class="card-lite">
        <h3>Мои заказы</h3>
        <div id="orders-block"></div>
      </div>
    </div>
  </main>

  <script src="account.js"></script>
</body>
</html>
