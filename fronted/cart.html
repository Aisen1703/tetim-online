<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корзина — TETIM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="top-line">
      <div class="container top-line-inner">
        <div class="top-line-left">
          <span>Доставка по Якутску</span>
          <span>Дежнева 30</span>
        </div>
        <div class="top-line-right">
          <a href="login.html">Войти</a>
          <a href="account.html">Кабинет</a>
          <a href="admin.html">Админ</a>
        </div>
      </div>
    </div>

    <div class="main-header">
      <div class="container main-header-inner">
        <a href="index.html" class="logo-link">
          <img src="assets/logo-full.png" alt="TETIM" class="brand-logo" />
        </a>

        <a href="catalog.html" class="catalog-button">Каталог</a>

        <div class="search-box">
          <input type="text" placeholder="Поиск по товарам" />
        </div>

        <div class="header-icons">
          <a href="account.html" class="header-icon-link">Профиль</a>
          <a href="cart.html" class="header-icon-link cart-link">Корзина <span id="cart-count">0</span></a>
        </div>
      </div>
    </div>
  </header>

  <main class="container cart-page">
    <div class="section-title-row">
      <div>
        <h1>Корзина</h1>
        <p>Проверьте товары и оформите заказ</p>
      </div>
    </div>

    <div class="cart-layout">
      <div class="card-lite">
        <div class="cart-header">
          <h3>Ваши товары</h3>
          <button class="clear-cart-btn" id="clear-cart-btn">Очистить</button>
        </div>
        <div id="cart-items"></div>
      </div>

      <div class="card-lite order-summary-card">
        <h3>Оформление заказа</h3>
        <div class="cart-total cart-total-large" id="cart-total">Итого: 0 ₽</div>

        <form id="checkout-form" class="form">
          <input type="text" id="customerName" placeholder="Ваше имя" required />
          <input type="tel" id="phone" placeholder="Телефон" required />
          <input type="email" id="email" placeholder="Email" />
          <textarea id="comment" placeholder="Комментарий к заказу"></textarea>
          <button type="submit" class="btn btn-dark full-width">Отправить заказ</button>
        </form>

        <div id="message" class="message hidden"></div>
      </div>
    </div>
  </main>

  <script src="cart.js"></script>
</body>
</html>
