<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель — TETIM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container" style="padding: 40px 0;">
    <div class="section-title-row">
      <div>
        <h1>Админ-панель</h1>
        <p>Добавление товаров, список клиентов, управление товарами и заказами</p>
      </div>
      <button id="admin-logout-btn" class="btn btn-light">Выйти</button>
    </div>

    <div class="promo-banner-grid">
      <section class="card-lite">
        <h3>Добавить товар</h3>
        <form id="product-form" class="form">
          <input type="text" id="product-name" placeholder="Название товара" required />
          <input type="text" id="product-category" placeholder="Категория" required />
          <input type="number" id="product-price" placeholder="Цена" required />
          <input type="text" id="product-size" placeholder="Размеры" />
          <input type="text" id="product-image" placeholder="Ссылка на фото" />
          <textarea id="product-description" placeholder="Описание"></textarea>
          <button type="submit" class="btn btn-dark full-width">Добавить товар</button>
        </form>
        <div id="product-message" class="message hidden"></div>
      </section>

      <section class="card-lite">
        <h3>Список клиентов</h3>
        <div id="admin-users-block"></div>
      </section>
    </div>

    <section class="card-lite" style="margin-top: 18px;">
      <h3>Управление товарами</h3>
      <div id="admin-products-block"></div>
    </section>

    <section class="card-lite" style="margin-top: 18px;">
      <h3>Смена статусов заказов</h3>
      <div id="admin-orders-block"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
